services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pratyaksh
      POSTGRES_DB: archbench
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:pratyaksh@db:5432/archbench
      REDIS_URL: redis://redis:6379/1
      RESULT_BACKEND_URL: redis://redis:6379/2
      BENCHMARK_APPS_ROOT: /benchmark_apps
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./benchmark_apps:/benchmark_apps
      - ./k6:/k6

  celery:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:pratyaksh@db:5432/archbench
      REDIS_URL: redis://redis:6379/1
      RESULT_BACKEND_URL: redis://redis:6379/2
      BENCHMARK_APPS_ROOT: /benchmark_apps
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./benchmark_apps:/benchmark_apps
      - ./k6:/k6

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata: