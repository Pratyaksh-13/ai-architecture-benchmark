services:
  gateway:
    image: nginx:alpine
    ports:
      - "8002:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shortener-service
      - redirect-service

  shortener-service:
    build: ./shortener-service
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/urlshortener
    depends_on:
      db:
        condition: service_healthy

  redirect-service:
    build: ./redirect-service
    environment:
      - SHORTENER_SERVICE_URL=http://shortener-service:8000
    depends_on:
      - shortener-service

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=urlshortener
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5
