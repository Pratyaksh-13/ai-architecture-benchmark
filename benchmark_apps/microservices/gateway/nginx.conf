events {}

http {
    upstream shortener {
        server microservices-shortener:8000;
    }

    upstream redirector {
        server microservices-redirect:8000;
    }

    server {
        listen 80;

        location /shorten {
            proxy_pass http://shortener;
        }

        location /stats/ {
            proxy_pass http://shortener;
        }

        location /internal/ {
            proxy_pass http://shortener;
        }

        location / {
            proxy_pass http://redirector;
        }
    }
}
